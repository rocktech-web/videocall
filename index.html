<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockTech Pro Video Call & Chat</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #333; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 10px; }
        .main-container { display: flex; flex: 1; gap: 10px; overflow: hidden; }
        
        /* Video Section */
        .video-section { flex: 2; display: flex; flex-direction: column; gap: 10px; }
        .video-wrapper { position: relative; background: #000; border-radius: 10px; overflow: hidden; flex: 1; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { width: 150px; height: 110px; position: absolute; top: 10px; right: 10px; border: 2px solid white; z-index: 10; border-radius: 8px; }
        
        /* Chat Section */
        .chat-section { flex: 1; background: #262626; border-radius: 10px; display: flex; flex-direction: column; padding: 10px; }
        #chatBox { flex: 1; overflow-y: auto; border-bottom: 1px solid #444; margin-bottom: 10px; padding: 5px; font-size: 0.9em; text-align: left; }
        .chat-input-area { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 8px; border-radius: 5px; border: none; }
        
        /* Buttons */
        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-share { background: #007bff; color: white; }
        .btn-fs { background: #6c757d; color: white; }
        .btn-send { background: #28a745; color: white; }
        .btn-pip { background: #ffc107; color: black; }
    </style>
</head>
<body>

<div class="header">
    <strong>RockTech प्रो कॉल</strong> | आईडी: <span id="myId">...</span>
    <button class="btn btn-share" onclick="copyInviteLink()">लिंक भेजें</button>
</div>

<div class="main-container">
    <div class="video-section">
        <div class="video-wrapper" id="videoArea">
            <video id="localVideo" autoplay muted playsinline></video>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <div class="controls">
            <button class="btn btn-fs" onclick="toggleFullScreen()">Full Screen</button>
            <button class="btn btn-pip" onclick="togglePiP()">Picture-in-Picture</button>
        </div>
    </div>

    <div class="chat-section">
        <div id="chatBox"></div>
        <div class="chat-input-area">
            <input type="text" id="msgInput" placeholder="संदेश लिखें...">
            <button class="btn btn-send" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const peer = new Peer();
    let localStream, currentConn;
    const chatBox = document.getElementById('chatBox');

    // 1. कैमरा शुरू करें
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
        localStream = stream;
        document.getElementById('localVideo').srcObject = stream;
        
        const urlParams = new URLSearchParams(window.location.search);
        const remoteId = urlParams.get('callId');
        if (remoteId) setTimeout(() => connectToPeer(remoteId), 2000);
    });

    peer.on('open', id => document.getElementById('myId').innerText = id);

    // 2. कॉल और चैट रिसीव करना
    peer.on('call', call => {
        call.answer(localStream);
        call.on('stream', stream => document.getElementById('remoteVideo').srcObject = stream);
    });

    peer.on('connection', conn => {
        currentConn = conn;
        setupChat();
    });

    // 3. कनेक्ट करने का फंक्शन
    function connectToPeer(id) {
        // वीडियो कॉल
        peer.call(id, localStream).on('stream', stream => {
            document.getElementById('remoteVideo').srcObject = stream;
        });
        // डेटा/चैट कनेक्शन
        currentConn = peer.connect(id);
        setupChat();
    }

    function setupChat() {
        currentConn.on('data', data => {
            chatBox.innerHTML += `<div><b>मित्र:</b> ${data}</div>`;
        });
    }

    function sendMessage() {
        const msg = document.getElementById('msgInput').value;
        if (currentConn && msg) {
            currentConn.send(msg);
            chatBox.innerHTML += `<div><b>मैं:</b> ${msg}</div>`;
            document.getElementById('msgInput').value = '';
        }
    }

    // 4. स्पेशल फीचर्स (Full Screen & PiP)
    function toggleFullScreen() {
        const elem = document.getElementById('videoArea');
        if (!document.fullscreenElement) elem.requestFullscreen();
        else document.exitFullscreen();
    }

    async function togglePiP() {
        try {
            const remoteVideo = document.getElementById('remoteVideo');
            if (remoteVideo !== document.pictureInPictureElement) {
                await remoteVideo.requestPictureInPicture();
            } else {
                await document.exitPictureInPicture();
            }
        } catch (error) {
            alert("आपका ब्राउज़र Picture-in-Picture सपोर्ट नहीं करता।");
        }
    }

    function copyInviteLink() {
        const url = window.location.origin + window.location.pathname + "?callId=" + document.getElementById('myId').innerText;
        navigator.clipboard.writeText(url);
        alert("लिंक कॉपी हो गया!");
    }
</script>
</body>
</html>
